[workspace]
name = "sgtree"
version = "2.0.0"
description = "Species tree construction from marker gene phylogenies"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.12,<3.13"
pandas = ">=2.2.3,<2.3"
duckdb = ">=1.2,<2"
biopython = ">=1.86,<1.87"
numpy = ">=1.26,<2"
ete3 = ">=3.1.3,<3.2"
mafft = ">=7.520,<8"
trimal = ">=1.5.0,<1.6"
fasttree = ">=2.2.0,<2.3"
iqtree = ">=3.0.1,<4"
matplotlib = ">=3.9,<4"
nbformat = ">=5.10.4,<6"
nbclient = ">=0.10.4,<0.11"
ipykernel = ">=7.2.0,<8"
quarto = ">=1.8,<2"
skani = ">=0.3.1,<0.4"
mcl = ">=22.282,<23"
mummer4 = ">=4.0.1,<5"
veryfasttree = ">=4.0.5,<5"

[pypi-dependencies]
pyhmmer = ">=0.12.0,<0.13"
pyrodigal = ">=3.6.0,<4"

[tasks]
sgtree = "python -m sgtree"
sgtree-python = "python -m sgtree"
example = "python -m sgtree testgenomes/Chloroflexi resources/models/UNI56.hmm --num_cpus 4 --save_dir runs/example_basic"
test-basic = "python -m sgtree testgenomes/Chloroflexi resources/models/UNI56.hmm --num_cpus 8"
test-full = "python -m sgtree testgenomes/Chloroflexi resources/models/UNI56.hmm --num_cpus 8 --marker_selection yes --ref testgenomes/chlorref"
test-unit = "python -m unittest discover -s tests -p 'test_*.py'"
clean-runtime = "bash -lc 'set -euo pipefail; shopt -s nullglob dotglob; rm -rf sgtree_out runs/docs_audit runs/example_basic; for d in results_*; do rm -rf -- \"$d\"; done; mkdir -p runs; touch runs/.gitkeep'"
clean-benchmarks = "bash -lc 'rm -rf runs/benchmarks'"
clean-reference-cache = "bash -lc 'rm -rf runs/reference_cache'"
clean-all = "pixi run clean-runtime && pixi run clean-benchmarks && pixi run clean-reference-cache"
benchmark-generate = "python bin/sgtree_benchmark.py generate"
benchmark-run = "python bin/sgtree_benchmark.py run"
benchmark-prepare-source = "python bin/sgtree_benchmark.py prepare-source-subset"
benchmark-prepare-burkholderiaceae = "python bin/sgtree_benchmark.py prepare-burkholderiaceae"
benchmark-generate-replicates = "python bin/sgtree_benchmark.py generate-replicates"
benchmark-run-replicates = "python bin/sgtree_benchmark.py run-replicates"
benchmark-aggregate-replicates = "python bin/sgtree_benchmark.py aggregate-replicates"
benchmark-prepare-burkholderiaceae-local = "python bin/prepare_burkholderiaceae_panel.py"
manuscript-docx = "bash -lc 'cd docs && quarto render MANUSCRIPT.qmd --to docx'"
